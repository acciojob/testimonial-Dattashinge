<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      background-color: #f5f5f5;
      padding: 40px;
    }

    .testimonial {
      background-color: white;
      border: 1px solid #ddd;
      padding: 20px;
      margin-bottom: 20px;
    }

    .author {
      text-align: right;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>Testimonials</h1>

  <div class="container">

    <div class="testimonial">
      <p>
        This product has completely changed the way I work.
      </p>
      <p class="author">- John Doe</p>
    </div>

    <div class="testimonial">
      <p>
        Excellent service and amazing support.
      </p>
      <p class="author">- Jane Smith</p>
    </div>

  </div>

</body>
</html>
